services:

  # ── Neo4j knowledge graph (GraphRAG) ────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: baymax-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser  → http://localhost:7474
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Streamlit chat interface ─────────────────────────────────────────────────
  streamlit:
    build: .
    container_name: baymax-streamlit
    ports:
      - "8501:8501"   # Streamlit UI   → http://localhost:8501
    env_file:
      - .env
    environment:
      # Override so the app reaches neo4j by its Docker service name, not localhost
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      # Persist embeddings, source data, and backups across container restarts
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      - ./backups:/app/backups
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
